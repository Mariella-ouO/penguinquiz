<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小全互动测试</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2&display=swap');

body, html {
  height: 100%;
  margin: 0;
  font-family: 'Baloo 2', cursive;
  background: #cce7ff; 
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 90%;
  max-width: 600px;
  min-height: 80%;
  padding: 30px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.page { display: none; width: 100%; transition: 0.3s; }
.page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

h2 { font-size: 2em; color: #333; margin-bottom: 15px; }
p { font-size: 1.3em; color: #444; margin-bottom: 25px; }

button.option {
  width: 80%;
  max-width: 400px;
  padding: 15px 20px;
  margin: 10px 0;
  font-size: 1.3em;
  border: 2px solid #87ceeb;
  border-radius: 25px;
  background: #ffffff;
  cursor: pointer;
  text-align: left;
  transition: 0.2s;
}
button.option:hover { background: #e0f0ff; }
button.option.selected { background: #87ceeb; color: #fff; }

textarea {
  width: 90%;
  padding: 10px;
  margin-top: 15px;
  border-radius: 15px;
  border: 1px solid #ccc;
  font-size: 1.2em;
  background: #ffffff;
}
label { font-size: 1.2em; font-weight: bold; display: block; margin-top: 20px; text-align: left; }

/* 去掉提交按钮圆角和背景 */
#endingForm button[type="submit"] {
  background: none;
  border: none;
  color: #87ceeb;
  font-size: 1.3em;
  cursor: pointer;
  padding: 0;
  margin-top: 10px;
}
#endingForm button[type="submit"]:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
<!-- 页面省略，保留和之前一样的 page1 ~ page8 -->

<!-- 结局页面 -->
<div class="page" id="endingPage">
  <h2 id="endingTitle">达成成就</h2>
  <p id="endingText"></p>
  <form id="endingForm">
    <label for="userMessage">最后，你有什么想对小全说的吗？</label>
    <textarea id="userMessage" name="message" rows="4"></textarea>
    <button type="submit">提交</button>
  </form>
  <p id="submitTip" style="margin-top:15px; color:#555;">你现在可以截屏结局页到小全朋友圈互动</p>
</div>

<script>
let generous=false, brave=false, rational=false;
let testAnswers={6:'',7:'',8:''};
let forceEnding='';

function goToPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function selectButton(btn){
  btn.parentNode.querySelectorAll('button.option').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

// 测试题和选择逻辑保持不变（省略 page2~page8 JS，和之前一样）
// ...

// 异步提交 Formspree
document.getElementById('endingForm').addEventListener('submit', function(e){
  e.preventDefault();
  const message = document.getElementById('userMessage').value;
  fetch("https://formspree.io/f/mojkwrnd", {
    method: "POST",
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: message })
  }).then(res => {
    if(res.ok){
      document.getElementById('submitTip').innerText = "提交成功！你现在可以截屏结局页到小全朋友圈互动";
      document.getElementById('userMessage').value = '';
    } else {
      document.getElementById('submitTip').innerText = "提交失败，请稍后重试~";
    }
  }).catch(err=>{
    document.getElementById('submitTip').innerText = "提交失败，请稍后重试~";
  });
});

// 结局逻辑
function showEndingPage(){
  let ending='';
  if(forceEnding){ ending=forceEnding; forceEnding=''; }
  else{
    let c6=testAnswers[6], c7=testAnswers[7], c8=testAnswers[8];
    let correct6='18', correct7='小蓝企鹅', correct8='0';

    if(brave){
      ending=(c6==correct6 && c7==correct7 && c8==correct8)?'hiddenBrave':'bad2';
    }
    else if(c6==correct6 && c7==correct7 && c8==correct8){
      if(rational) ending='hiddenRational';
      else if(generous) ending='hiddenGenerous';
      else ending='happy1';
    }
    else{
      ending=(c6==c7 && c7==c8 && c6=='不知道')?'happy2':'happy3';
    }
  }

  const endings={
    hiddenGenerous:{title:"达成成就：慷慨的伙伴", text:"你答对了三道题，还把巧克力都给了小全，你真好。"},
    hiddenBrave:{title:"达成成就：勇敢的伙伴", text:"你通过了考验，是真正的勇敢者。"},
    hiddenRational:{title:"达成成就：理智的伙伴", text:"尽管你质疑了小全的礼物，但正确回答了所有问题。能面刺寡人之过者，受上赏。"},
    happy1:{title:"达成成就：智慧的伙伴", text:"你答对了所有问题，智慧之光比世界上所有的石头都更闪亮。"},
    happy2:{title:"达成成就：诚实的伙伴", text:"你在所有问题上都选择了“不知道”。你的诚实打动了小全。"},
    happy3:{title:"达成成就：忠诚的伙伴", text:"尽管没有得到全部问题的正确答案，你的耐心与陪伴打动了小全。她愿意和你一起继续冒险。"},
    bad1:{title:"达成成就：回归现实", text:"学业繁忙，压力过大，也不要忘了和小全聊聊天。"},
    bad2:{title:"达成成就：失败的伙伴", text:"你没能通过小全的测试。之前抢来的石头全部打在了你身上。"}
  };

  document.getElementById('endingTitle').innerText = endings[ending].title;
  document.getElementById('endingText').innerText = endings[ending].text;
  goToPage('endingPage');
}
</script>
</div>
</body>
</html>
